<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Thank you for contacting Lumen and Pixel." />
<title>Thank You — Lumen and Pixel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue-100: #dfe9f0;
    --blue-500: #16598c;
    --blue-700: #021829;
    --blue-900: #00080e;
    --green-300: #7ef67d;
    --green-500: #33fb31;
    --gray-100: #f0f1f3;
    --gray-300: #b8bec8;
    --gray-500: #6b7485;
    --gray-700: #2e3441;
    --font-display: 'Space Mono', monospace;
    --font-body: 'Nunito', sans-serif;
  }
  body {
    min-height: 100vh;
    background: var(--blue-700);
    color: var(--gray-100);
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }
  nav {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px; height: 68px;
    background: rgba(223,233,240,0.97);
    border-bottom: 1px solid rgba(46,52,65,0.6);
  }
  .nav-logo { font-family: var(--font-display); font-size: 15px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue-700); }
  .nav-home { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue-700); }
  main {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 72px 24px;
  }
  .card {
    width: min(720px, 100%);
    background: var(--blue-900);
    border: 1px solid rgba(130,178,215,0.2);
    padding: 48px;
  }
  .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--green-500); margin-bottom: 20px;
  }
  h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.6rem);
    line-height: 1.05;
    margin-bottom: 20px;
  }
  p {
    color: var(--gray-300);
    font-size: 15px;
    line-height: 1.8;
  }
  .actions {
    display: flex; gap: 16px; flex-wrap: wrap; margin-top: 32px;
  }
  .primary, .secondary {
    min-height: 44px; display: inline-flex; align-items: center; justify-content: center;
    padding: 14px 22px; border-radius: 3px; font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .primary { background: var(--green-500); color: var(--blue-700); }
  .primary:hover { background: var(--green-300); }
  .secondary { border: 1px solid rgba(130,178,215,0.25); color: var(--gray-100); }
  .secondary:hover { border-color: var(--green-500); color: var(--green-500); }
  footer { padding: 28px 24px 36px; text-align: center; color: var(--gray-500); font-size: 12px; }
  @media (max-width: 700px) {
    nav { padding: 0 24px; }
    .card { padding: 36px 24px; }
    .actions { flex-direction: column; }
  }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Lumen and Pixel</a>
  <a href="index.html" class="nav-home">Back to home</a>
</nav>
<main>
  <section class="card" aria-labelledby="thank-you-title">
    <p class="eyebrow">Message received</p>
    <h1 id="thank-you-title">Thank you for reaching out.</h1>
    <p>Your enquiry was submitted successfully. We’ll review it and get back to you within one business day.</p>
    <div class="actions">
      <a class="primary" href="services.html">View services</a>
      <a class="secondary" href="index.html">Return to homepage</a>
    </div>
  </section>
</main>
<footer>© Lumen and Pixel 2025</footer>
</body>
</html>
